name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1' # hetfo hajnal: friss zonaadattal ujraepul
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Zonaadatok letoltese (nincs a repoban, publikalaskor frissul)
        run: python tools/update-zones.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
